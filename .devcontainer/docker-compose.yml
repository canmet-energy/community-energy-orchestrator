services:
  api:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        GIT_API_TOKEN: ${GIT_API_TOKEN:-nothing}
        LOCALNRCAN: ${LOCALNRCAN:-}
    image: community-energy-orchestrator-dev:latest
    user: vscode
    volumes:
      - ..:/workspaces:cached
    command: sleep infinity
    restart: "no"
    healthcheck:
      disable: true

  frontend:
    image: hello-world:latest
    entrypoint: ["true"]
    profiles:
      - production-only

