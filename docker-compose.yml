services:
  api:
    build: .
    image: community-energy-orchestrator:latest
    container_name: community-energy-api
    # Run as root so entrypoint.sh can fix volume mount permissions,
    # then it drops to appuser (UID 1000) via setpriv before starting uvicorn
    user: "0:0"
    ports:
      - "8000:8000"
    volumes:
      # Mount directories to persist outputs on host machine
      - ./output:/app/output
      - ./logs:/app/logs
      # Mount source-archetypes (not in git - add manually if needed)
      - ./data/source-archetypes:/app/data/source-archetypes
    environment:
      # Optional: Set environment variables for configuration
      # - MAX_PARALLEL_WORKERS=4
      # - ANALYSIS_RANDOM_SEED=42
      # - ARCHETYPE_SELECTION_SEED=12345
      - PYTHONUNBUFFERED=1
      - ALLOWED_ORIGINS=http://localhost:5173
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    image: community-energy-frontend:latest
    container_name: community-energy-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped