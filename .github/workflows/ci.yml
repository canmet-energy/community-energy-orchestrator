name: CI

on:
  push:
    branches: [ main, dev, review ]
  pull_request:
    branches: [ main, dev, review ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Lint with black
        run: uv run black --check backend/ tests/
      
      - name: Lint with pylint
        run: uv run pylint backend/
        continue-on-error: true
      
      - name: Type check with mypy
        run: uv run mypy backend/
        continue-on-error: true
      
      - name: Check imports with isort
        run: uv run isort --check-only backend/ tests/
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Run unit tests with coverage
        run: uv run pytest tests/unit/ -m unit --cov=backend/ --cov-report=xml --cov-report=term-missing --cov-report=html
      
      - name: Run integration tests
        run: uv run pytest tests/integration/ -m integration
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker compose build
      
      - name: Test Docker container starts
        run: |
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose down

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Run safety check
        run: uv run safety check --json
        continue-on-error: true
      
      - name: Run bandit security scan
        run: uv run bandit -r backend/ -f json -o bandit-report.json
        continue-on-error: true
